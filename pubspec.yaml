name: gita_life
description: GitaLife — Spiritual companion app for ISKCON students
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management
  flutter_riverpod: ^2.4.0
  # Navigation
  go_router: ^13.0.0
  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.1.0
  # Local DB
  sqflite: ^2.3.0
  hive_flutter: ^1.1.0
  # Audio
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  # HTTP
  dio: ^5.4.0
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  # Video
  youtube_player_flutter: ^9.0.1
  # Utils
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.5
  permission_handler: ^11.3.0
  vibration: ^1.8.4
  image_picker: ^1.0.7
  share_plus: ^7.2.1
  csv: ^5.0.2
  flutter_local_notifications: ^17.0.0
  intl: ^0.20.2
  sqflite_common_ffi: ^2.4.0+2
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
    - assets/db/
  fonts:
    - family: NotoSerifDevanagari
      fonts:
        - asset: assets/fonts/NotoSerifDevanagari-Regular.ttf
        - asset: assets/fonts/NotoSerifDevanagari-Bold.ttf
          weight: 700
